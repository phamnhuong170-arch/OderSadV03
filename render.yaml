services:
  - type: web
    name: gamek
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gamek-db
          property: connectionString

databases:
  - name: gamek-db
    databaseName: gamek
    user: gamek
    plan: free
